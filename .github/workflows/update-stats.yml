name: Update profile stats

on:
  schedule:
    - cron: '17 5 * * 1' # weekly, Mondays at 05:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/**', '.github/workflows/update-stats.yml']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Regenerate SVGs
        run: npm run update
        env:
          # Requires an ACCESS_TOKEN secret: a PAT (fine-grained, Contents: Read-only,
          # or classic with the repo scope) so private-repo contributions are counted.
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update stats"
            git push
          fi
